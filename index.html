<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a73e8">
    <title>Portaria Digital v66</title>
    <link rel="manifest" href="manifest.json?v=66">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, getDocs, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfZDAEGaSbzm6W63yTqYo01dnnSrOqIzM",
            authDomain: "portari-digiral-v3.firebaseapp.com",
            projectId: "portari-digiral-v3",
            storageBucket: "portari-digiral-v3.firebasestorage.app",
            messagingSenderId: "859559354841",
            appId: "1:859559354841:web:2926bdeb4536029e29b9c8"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.fb = { collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, getDocs, where, deleteDoc };
    </script>

    <script src="https://unpkg.com/html5-qrcode/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --primary: #1a73e8; --success: #28a745; --danger: #dc3545; --warning: #ffc107; --bg: #f0f2f5; --card-gray: #f8f9fa; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; text-transform: capitalize; }
        .no-cap { text-transform: none !important; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 30px; color: #333; }
        #tela-login { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--primary); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 101; font-weight: bold; }
        .tabs { display: flex; background: white; position: sticky; top: 48px; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-btn { flex: 1; padding: 15px 5px; border: none; background: none; font-weight: bold; color: #666; font-size: 13px; cursor: pointer; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 15px; }
        input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; margin-bottom: 10px; }
        .item-row { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--danger); display: flex; align-items: center; gap: 12px; }
        .item-row.entregue { border-left-color: var(--success); background: var(--card-gray); }
        
        #reader, #reader-saida { width: 100%; background: #000; border-radius: 8px; overflow: hidden; display: none; margin-bottom: 10px; }
        #modal-assinatura { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 95%; max-width: 400px; }
        .sig-wrapper { background: #FFFFFF; border: 2px solid #ccc; border-radius: 8px; margin-top: 10px; text-transform: none; }
        canvas { width: 100%; height: 200px; touch-action: none; cursor: crosshair; }
        
        .btn-pdf-small { background: #f1f3f4; color: #d93025; padding: 8px; border-radius: 6px; border: 1px solid #dadce0; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div id="tela-login">
    <div class="login-card">
        <h2 style="color:var(--primary); margin-bottom:5px;">Portaria Digital v66</h2>
        <input type="password" id="senha-login" placeholder="Senha De Acesso">
        <button class="btn" style="background:var(--primary)" onclick="verificarAcesso()">Entrar</button>
        <button class="btn" style="background:none; color:var(--danger); font-size:11px; border:1px solid var(--danger); margin-top:15px;" onclick="resetarSistema()">Limpar Banco</button>
    </div>
</div>

<div id="conteudo-sistema" style="display:none;">
    <div class="header">Portaria Digital v66</div>
    <div class="tabs">
        <button id="btn-tab-registro" class="tab-btn active" onclick="switchTab('registro', this)">Entrada</button>
        <button id="btn-tab-saida" class="tab-btn" onclick="switchTab('pendentes', this)">Saída</button>
        <button class="tab-btn" onclick="switchTab('retiradas', this)">Histórico</button>
    </div>

    <div id="aba-registro" class="container">
        <div class="card">
            <div id="reader"></div>
            <button class="btn" style="background:#6f42c1" onclick="alternarScanner('entrada')">📷 Escanear Código</button>
            <input type="text" id="rastreio" placeholder="Rastreio" class="no-cap" onblur="processarRastreio(this)">
            <input type="text" id="loja" placeholder="Empresa/Loja">
            <input type="text" id="destinatario" placeholder="Nome Do Destinatário">
            <div style="display:flex; gap:10px;">
                <input type="text" id="apto" placeholder="Apto" style="flex:1;">
                <input type="text" id="bloco" placeholder="Bloco" style="flex:1;">
            </div>
            <input type="text" id="recebidoPor" placeholder="Recebido Por (Funcionário)">
            <button class="btn" style="background:var(--primary)" onclick="adicionarNaLista()">+ Adicionar À Lista</button>
            <div id="lista-pre-entrada"></div>
            <button id="btn-salvar-tudo" class="btn" style="background:var(--success); display:none;" onclick="salvarNoFirebase()">Salvar Entrada</button>
        </div>
    </div>

    <div id="aba-pendentes" class="container" style="display:none;">
        <div id="reader-saida"></div>
        <button class="btn" style="background:#6f42c1" onclick="alternarScanner('saida')">📷 Escanear Para Saída</button>
        <input type="text" id="busca-pen" placeholder="🔍 Buscar Encomendas..." oninput="render()">
        <button id="btn-retirar-lote" class="btn" style="background:var(--warning); color:#000; display:none;" onclick="abrirModal()">Dar Baixa Nos Selecionados</button>
        <div id="lista-pendentes"></div>
    </div>

    <div id="aba-retiradas" class="container" style="display:none;">
        <button class="btn" style="background:#333;" onclick="gerarRelatorio()">📄 Relatório Geral Completo</button>
        <input type="text" id="busca-his" placeholder="🔍 Filtrar Histórico..." oninput="render()">
        <div id="lista-retiradas"></div>
    </div>
</div>

<div id="modal-assinatura">
    <div class="modal-content">
        <h3>Confirmar Retirada</h3>
        <input type="text" id="quemRetirou" placeholder="Retirado Por">
        <div class="sig-wrapper"><canvas id="signature-pad"></canvas></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn" style="background:var(--danger); flex:1" onclick="fecharModal()">Cancelar</button>
            <button class="btn" id="btn-confirm-final" style="background:var(--success); flex:1" onclick="confirmarEntrega()">Confirmar Saída</button>
        </div>
    </div>
</div>

<script>
    let dados = [], listaTemp = [], idsSelecionados = [], pad, html5QrCode;

    function caps(str) {
        if (!str) return "";
        return str.toLowerCase().replace(/(^\w|\s\w)/g, m => m.toUpperCase());
    }

    function verificarAcesso() {
        if(document.getElementById('senha-login').value === "1234") {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('conteudo-sistema').style.display = 'block';
            pad = new SignaturePad(document.getElementById('signature-pad'), { penColor: 'black' });
            iniciarEscuta();
        } else alert("Senha Incorreta!");
    }

    async function resetarSistema() {
        if(confirm("Deseja Apagar Tudo?")) {
            const s = prompt("Senha Mestre:");
            if(s === "9988") {
                const snap = await window.fb.getDocs(window.fb.collection(window.db, "encomendas"));
                for (const d of snap.docs) await window.fb.deleteDoc(window.fb.doc(window.db, "encomendas", d.id));
                location.reload();
            }
        }
    }

    function processarRastreio(input) {
        let v = input.value.trim();
        if(!v) return;
        const existeTemp = listaTemp.some(i => i.rastreio.toLowerCase().includes(v.toLowerCase()));
        const existeBanco = dados.some(i => i.rastreio.toLowerCase().includes(v.toLowerCase()));
        if(existeTemp || existeBanco) {
            alert("Esta encomenda já consta no sistema.");
            input.value = "";
            setTimeout(() => input.focus(), 10);
            return;
        }
        identificarTransportadora(input);
    }

    function identificarTransportadora(input) {
        let v = input.value.trim();
        if(!v || v.includes(':')) return;
        let emp = "Outros";
        if(/^[A-Z]{2}\d{9}[A-Z]{2}$/i.test(v)) emp = "Correios";
        else if(/^SMP\d+|^11\d{10}/i.test(v)) emp = "Loggi";
        else if(/^MLB\d+/i.test(v)) emp = "Mercado Livre";
        input.value = `${emp}: ${v}`;
    }

    function alternarScanner(modo) {
        const idReader = modo === 'entrada' ? 'reader' : 'reader-saida';
        if (!html5QrCode) {
            document.getElementById(idReader).style.display = 'block';
            html5QrCode = new Html5Qrcode(idReader);
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                if(modo === 'entrada') {
                    const inp = document.getElementById('rastreio');
                    inp.value = text;
                    processarRastreio(inp);
                    pararScanner();
                } else {
                    selecionarPorScan(text);
                }
            });
        } else pararScanner();
    }

    function selecionarPorScan(codigo) {
        const item = dados.find(d => d.status === "PENDENTE" && d.rastreio.toLowerCase().includes(codigo.toLowerCase()));
        if(item) {
            if(!idsSelecionados.includes(item.id)) {
                idsSelecionados.push(item.id);
                render();
            }
        } else {
            alert("Encomenda não encontrada nos pendentes.");
        }
    }

    function pararScanner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => { 
                html5QrCode = null; 
                document.getElementById('reader').style.display = 'none'; 
                document.getElementById('reader-saida').style.display = 'none'; 
            });
        }
    }

    function switchTab(aba, btn) {
        pararScanner();
        document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
        document.getElementById('aba-' + aba).style.display = 'block';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function iniciarEscuta() {
        const q = window.fb.query(window.fb.collection(window.db, "encomendas"), window.fb.orderBy("dataEntrada", "desc"));
        window.fb.onSnapshot(q, (snap) => {
            dados = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            render();
        });
    }

    function adicionarNaLista() {
        const r = document.getElementById('rastreio').value, d = document.getElementById('destinatario').value, a = document.getElementById('apto').value;
        const bl = document.getElementById('bloco').value, lo = document.getElementById('loja').value;
        if(!r || !d || !a) return alert("Preencha Os Campos!");
        listaTemp.push({
            rastreio: r, loja: caps(lo) || "Não Informada",
            dest: caps(d), apto: a, bloco: caps(bl) || "-",
            dataEntrada: new Date().toISOString(), status: "PENDENTE"
        });
        document.getElementById('rastreio').value = ""; 
        document.getElementById('destinatario').value = ""; 
        document.getElementById('loja').value = "";
        document.getElementById('apto').value = "";
        document.getElementById('bloco').value = "";
        atualizarPreview();
    }

    function atualizarPreview() {
        const div = document.getElementById('lista-pre-entrada');
        div.innerHTML = listaTemp.map((i, idx) => `
            <div class="card" style="background:#fffde7; border:1px solid #ffd54f; padding:10px;">
                <div style="display:flex; justify-content:space-between;">
                    <div>
                        <b>${i.dest}</b><br>
                        <small>Apto ${i.apto} / Bl ${i.bloco}</small><br>
                        <small>Loja/Empresa: ${i.loja}</small><br>
                        <small class="no-cap" style="color:blue;">${i.rastreio}</small>
                    </div>
                    <button onclick="listaTemp.splice(${idx},1); atualizarPreview();" style="color:red; border:none; background:none; font-size:18px;">×</button>
                </div>
            </div>`).join('');
        document.getElementById('btn-salvar-tudo').style.display = listaTemp.length > 0 ? 'block' : 'none';
    }

    async function salvarNoFirebase() {
        const f = caps(document.getElementById('recebidoPor').value);
        if(!f) return alert("Quem Recebeu?");
        for(let item of listaTemp) { item.recebidoPor = f; await window.fb.addDoc(window.fb.collection(window.db, "encomendas"), item); }
        listaTemp = [];
        atualizarPreview();
    }

    function render() {
        const lp = document.getElementById('lista-pendentes'), lr = document.getElementById('lista-retiradas');
        const bP = document.getElementById('busca-pen').value.toLowerCase(), bH = document.getElementById('busca-his').value.toLowerCase();
        lp.innerHTML = ""; lr.innerHTML = "";
        
        dados.forEach(i => {
            const txt = `${i.dest} ${i.apto} ${i.rastreio} ${i.quemRetirou}`.toLowerCase();
            if(i.status === "PENDENTE" && txt.includes(bP)) {
                const isChecked = idsSelecionados.includes(i.id) ? "checked" : "";
                lp.innerHTML += `
                    <div class="item-row">
                        <input type="checkbox" style="width:22px; height:22px" value="${i.id}" ${isChecked} onchange="contar()">
                        <div><b>${i.dest}</b><br><small>Apto ${i.apto} / Bl ${i.bloco} | ${i.loja}</small><br><small class="no-cap" style="color:blue;">${i.rastreio}</small></div>
                    </div>`;
            } else if(i.status === "ENTREGUE" && txt.includes(bH)) {
                lr.innerHTML += `
                    <div class="item-row entregue" style="flex-direction:column; align-items:flex-start;">
                        <div style="width:100%; display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <b>${i.dest}</b><br><small>Apto ${i.apto} / Bl ${i.bloco} | ${i.loja}</small><br><small class="no-cap" style="color:blue;">${i.rastreio}</small><br>
                                <small style="color:green">Retirado Por: ${i.quemRetirou}</small>
                            </div>
                            <div class="btn-pdf-small" onclick="gerarProtocoloIndividual('${i.id}')">📄</div>
                        </div>
                    </div>`;
            }
        });
        verificarBotaoLote();
    }

    function contar() {
        idsSelecionados = Array.from(document.querySelectorAll('#lista-pendentes input:checked')).map(el => el.value);
        verificarBotaoLote();
    }

    function verificarBotaoLote() {
        const btn = document.getElementById('btn-retirar-lote');
        if(idsSelecionados.length > 0) {
            btn.style.display = 'block';
            btn.innerText = `Dar Baixa Em ${idsSelecionados.length} Pacote(s)`;
        } else {
            btn.style.display = 'none';
        }
    }

    function abrirModal() { 
        pararScanner();
        document.getElementById('modal-assinatura').style.display='flex'; 
        pad.clear(); 
    }
    
    function fecharModal() { document.getElementById('modal-assinatura').style.display='none'; }

    function getTrimmedSignature() {
        if (pad.isEmpty()) return null;
        const originalCanvas = document.getElementById('signature-pad');
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = originalCanvas.width;
        tempCanvas.height = originalCanvas.height;
        const ctx = tempCanvas.getContext('2d');
        ctx.drawImage(originalCanvas, 0, 0);
        const imgData = ctx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) { if (data[i] > 240 && data[i+1] > 240 && data[i+2] > 240) data[i + 3] = 0; }
        ctx.putImageData(imgData, 0, 0);
        return tempCanvas.toDataURL('image/png');
    }

    async function confirmarEntrega() {
        const n = caps(document.getElementById('quemRetirou').value);
        const imgTransparent = getTrimmedSignature();
        if(!n || !imgTransparent) return alert("Nome E Assinatura!");
        for(let id of idsSelecionados) {
            await window.fb.updateDoc(window.fb.doc(window.db, "encomendas", id), {
                status: "ENTREGUE", dataRetirada: new Date().toISOString(), quemRetirou: n, assinatura: imgTransparent
            });
        }
        idsSelecionados = [];
        verificarBotaoLote();
        document.getElementById('quemRetirou').value = "";
        fecharModal();
    }

    function gerarProtocoloIndividual(id) {
        const i = dados.find(d => d.id === id);
        const { jsPDF } = window.jspdf;
        const docP = new jsPDF();
        docP.text("Recibo De Retirada", 105, 20, { align: 'center' });
        docP.autoTable({
            startY: 30,
            body: [
                ['Destinatário', i.dest], 
                ['Unidade', `Apto: ${i.apto} / Bloco: ${i.bloco}`], 
                ['Loja/Empresa', i.loja], 
                ['Rastreio', i.rastreio], 
                ['Recebido Por', i.recebidoPor], // ADICIONADO CONFORME SOLICITADO
                ['Entrada', new Date(i.dataEntrada).toLocaleString()], 
                ['Saída', new Date(i.dataRetirada).toLocaleString()], 
                ['Quem Retirou', i.quemRetirou]
            ],
            theme: 'grid'
        });
        docP.addImage(i.assinatura, 'PNG', 15, docP.lastAutoTable.finalY + 10, 60, 30);
        docP.save(`Recibo_${i.dest}.pdf`);
    }

    async function gerarRelatorio() {
        const { jsPDF } = window.jspdf;
        const docR = new jsPDF('l', 'mm', 'a4');
        const entregues = dados.filter(d => d.status === "ENTREGUE");
        
        docR.autoTable({
            head: [['Empresa', 'Rastreio', 'Destinatário (Apto / Bl)', 'Recebido Por (Data - Hora)', 'Retirado Por (Data - Hora)', 'Assinatura']],
            body: entregues.map(i => [
                i.loja, 
                i.rastreio, 
                `${i.dest}\n(Apto: ${i.apto} / Bl: ${i.bloco})`, 
                `${i.recebidoPor}\n(${new Date(i.dataEntrada).toLocaleString()})`, 
                `${i.quemRetirou}\n(${new Date(i.dataRetirada).toLocaleString()})`, 
                ''
            ]),
            didDrawCell: (data) => {
                if (data.column.index === 5 && data.cell.section === 'body') {
                    const img = entregues[data.row.index].assinatura;
                    if (img) docR.addImage(img, 'PNG', data.cell.x + 2, data.cell.y + 2, 22, 10);
                }
            },
            headStyles: { minCellHeight: 6 }, // AJUSTADO CONFORME SOLICITADO
            styles: { minCellHeight: 18, fontSize: 8 }
        });
        docR.save("Relatorio_Geral.pdf");
    }
</script>
</body>
</html>

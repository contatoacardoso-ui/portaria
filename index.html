<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a73e8">
    <title>Portaria Digital v107</title>
    <link rel="manifest" href="manifest.json?v=107">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, getDocs, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfZDAEGaSbzm6W63yTqYo01dnnSrOqIzM",
            authDomain: "portari-digiral-v3.firebaseapp.com",
            projectId: "portari-digiral-v3",
            storageBucket: "portari-digiral-v3.firebasestorage.app",
            messagingSenderId: "859559354841",
            appId: "1:859559354841:web:2926bdeb4536029e29b9c8"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.fb = { collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, getDocs, where, deleteDoc };
    </script>

    <script src="https://unpkg.com/html5-qrcode/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --primary: #1a73e8; --success: #28a745; --danger: #dc3545; --warning: #ffc107; --bg: #f0f2f5; --card-gray: #f8f9fa; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; text-transform: capitalize; }
        .no-cap { text-transform: none !important; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 140px; color: #333; }
        
        #tela-login { position: fixed; top:0; left:0; width:100%; height:100%; background-color: white; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .login-card { background: rgba(255, 255, 255, 0.9); padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-entrar { width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; background: var(--primary); }
        .btn-limpar-discreto { background: none; border: none; color: #bbb; font-size: 11px; margin-top: 50px; cursor: pointer; text-decoration: underline; text-transform: none; }

        .header { background: var(--primary); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 110; font-weight: bold; }
        .tabs { display: flex; background: white; position: sticky; top: 48px; z-index: 110; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-btn { flex: 1; padding: 15px 5px; border: none; background: none; font-weight: bold; color: #666; font-size: 13px; cursor: pointer; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 15px; }
        input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; margin-bottom: 10px; }
        
        #reader, #reader-saida { 
            display: none; 
            background: #000; 
            border-radius: 8px; 
            overflow: hidden; 
            width: 100%; 
            height: 180px !important; 
            margin: 5px 0 15px 0; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: relative !important;
        }
        
        #reader video, #reader-saida video { height: 180px !important; object-fit: cover !important; }

        .mira-escaner {
            position: absolute;
            top: 25px; left: 25px; right: 25px; bottom: 25px;
            z-index: 100;
            pointer-events: none;
            background: 
                linear-gradient(to right, #666 20px, transparent 20px) 0 0,
                linear-gradient(to bottom, #666 20px, transparent 20px) 0 0,
                linear-gradient(to left, #666 20px, transparent 20px) 100% 0,
                linear-gradient(to bottom, #666 20px, transparent 20px) 100% 0,
                linear-gradient(to right, #666 20px, transparent 20px) 0 100%,
                linear-gradient(to top, #666 20px, transparent 20px) 0 100%,
                linear-gradient(to left, #666 20px, transparent 20px) 100% 100%,
                linear-gradient(to top, #666 20px, transparent 20px) 100% 100%;
            background-repeat: no-repeat;
            background-size: 25px 25px;
            transition: 0.1s;
        }

        .scan-sucesso .mira-escaner {
            background: 
                linear-gradient(to right, #00ff00 20px, transparent 20px) 0 0,
                linear-gradient(to bottom, #00ff00 20px, transparent 20px) 0 0,
                linear-gradient(to left, #00ff00 20px, transparent 20px) 100% 0,
                linear-gradient(to bottom, #00ff00 20px, transparent 20px) 100% 0,
                linear-gradient(to right, #00ff00 20px, transparent 20px) 0 100%,
                linear-gradient(to top, #00ff00 20px, transparent 20px) 0 100%,
                linear-gradient(to left, #00ff00 20px, transparent 20px) 100% 100%,
                linear-gradient(to top, #00ff00 20px, transparent 20px) 100% 100%;
            background-repeat: no-repeat;
            background-size: 25px 25px;
            filter: drop-shadow(0 0 8px #00ff00);
        }

        #reader__dashboard, #reader-saida__dashboard, #reader__scan_region img { display: none !important; }

        .item-row { background: white; padding: 10px 15px; border-radius: 10px; margin-bottom: 8px; border-left: 5px solid var(--danger); display: flex; align-items: center; gap: 12px; }
        .item-row.entregue { border-left-color: var(--success); }
        .detalhes-item { flex: 1; line-height: 1.2; }
        .detalhes-item b { font-size: 15px; color: #000; display: block; margin-bottom: 2px; }
        .detalhes-item span { color: #444; display: block; font-size: 13px; }
        .detalhes-item small { color: #777; display: block; font-size: 12px; }
        
        .info-rec { border-top: 1px solid #eee; margin-top: 6px; padding-top: 6px; color: #888 !important; font-size: 11px !important; }

        .footer-logout { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 10px; border-top: 1px solid #eee; display: flex; justify-content: center; z-index: 102; }
        .btn-logout { background: #f8f9fa; color: #666; border: 1px solid #ddd; padding: 8px 20px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        #btn-retirar-lote { position: fixed; bottom: 65px; left: 5%; width: 90%; z-index: 105; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        #modal-assinatura { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 95%; max-width: 400px; }
        .sig-wrapper { background: #FFFFFF; border: 2px solid #ccc; border-radius: 8px; margin-top: 10px; overflow: hidden; }
        canvas { width: 100%; height: 200px; touch-action: none; display: block; }
        
        .btn-pdf-icon { background: none; border: none; cursor: pointer; padding: 5px; font-size: 24px; vertical-align: middle; }
    </style>
</head>
<body>

<div id="tela-login">
    <div class="login-card">
        <h2 class="no-cap">Portaria Digital v107</h2>
        <input type="password" id="senha-login" placeholder="Senha De Acesso">
        <button class="btn-entrar" onclick="verificarAcesso()">Entrar</button>
        <button class="btn-limpar-discreto" onclick="resetarSistema()">Reset System</button>
    </div>
</div>

<div id="conteudo-sistema" style="display:none;">
    <div class="header">Portaria Digital v107</div>
    <div class="tabs">
        <button id="btn-tab-registro" class="tab-btn active" onclick="switchTab('registro', this)">Entrada</button>
        <button id="btn-tab-pendentes" class="tab-btn" onclick="switchTab('pendentes', this)">Saída</button>
        <button id="btn-tab-retiradas" class="tab-btn" onclick="switchTab('retiradas', this)">Histórico</button>
    </div>

    <div id="aba-registro" class="container">
        <div class="card">
            <button class="btn" style="background:#6f42c1" onclick="alternarScanner('entrada')">📷 Escanear Código</button>
            <div id="reader"><div class="mira-escaner"></div></div>
            <input type="text" id="rastreio" placeholder="Rastreio" class="no-cap" onblur="processarRastreio(this)">
            <input type="text" id="loja" placeholder="Loja">
            <input type="text" id="destinatario" placeholder="Nome Do Destinatário">
            <div style="display:flex; gap:10px;">
                <input type="text" id="apto" placeholder="Apto" style="flex:1;">
                <input type="text" id="bloco" placeholder="Bl" style="flex:1;">
            </div>
            <input type="text" id="recebidoPor" placeholder="Recebido Por (Funcionário)">
            <button class="btn" style="background:var(--primary)" onclick="adicionarNaLista()">+ Adicionar À Lista</button>
            <div id="lista-pre-entrada"></div>
            <button id="btn-salvar-tudo" class="btn" style="background:var(--success); display:none;" onclick="salvarNoFirebase()">Salvar Entrada</button>
        </div>
    </div>

    <div id="aba-pendentes" class="container" style="display:none;">
        <button class="btn" style="background:#6f42c1" onclick="alternarScanner('saida')">📷 Escanear Para Saída</button>
        <div id="reader-saida"><div class="mira-escaner"></div></div> 
        <input type="text" id="busca-pen" placeholder="🔍 Buscar Encomendas..." oninput="render()">
        <div id="lista-pendentes"></div>
        <button id="btn-retirar-lote" class="btn" style="background:var(--warning); color:#000; display:none;" onclick="abrirModal()">Baixar Encomendas</button>
    </div>

    <div id="aba-retiradas" class="container" style="display:none;">
        <div class="card" style="display: flex; align-items: center; justify-content: space-between; padding: 15px;">
            <span style="font-weight: bold; font-size: 14px;">Registro Geral:</span>
            <button class="btn-pdf-icon" onclick="gerarRelatorioGeral()">📄</button>
        </div>
        <input type="text" id="busca-his" placeholder="🔍 Filtrar Histórico..." oninput="render()">
        <div id="lista-retiradas"></div>
    </div>

    <div class="footer-logout">
        <button class="btn-logout" onclick="localStorage.clear(); location.reload()">⬅ Sair do Sistema</button>
    </div>
</div>

<div id="modal-assinatura">
    <div class="modal-content">
        <h3>Confirmar Retirada</h3>
        <input type="text" id="quemRetirou" placeholder="Retirado Por">
        <div class="sig-wrapper"><canvas id="signature-pad"></canvas></div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn" style="background:var(--warning); color:#000; flex:1; padding:10px;" onclick="pad.clear()">Limpar</button>
            <button class="btn" style="background:var(--danger); flex:1; padding:10px;" onclick="fecharModal()">Cancelar</button>
        </div>
        <button class="btn" id="btn-confirm-final" style="background:var(--success); width:100%; margin-top:10px;" onclick="confirmarEntrega()">Confirmar Saída</button>
    </div>
</div>

<script>
    let dados = [], listaTemp = [], idsSelecionados = [], pad, html5QrCode, ultimoSelecionado = null;
    const SENHA_SISTEMA = "1234";

    function caps(str) { return str ? str.toLowerCase().replace(/(^\w|\s\w)/g, m => m.toUpperCase()) : ""; }

    function tocarBip() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
            gainNode.gain.setValueAtTime(1, ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
            osc.connect(gainNode); gainNode.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
            
            document.body.classList.add('scan-sucesso');
            setTimeout(() => document.body.classList.remove('scan-sucesso'), 400);
        } catch (e) {}
    }

    function verificarAcesso() {
        if(document.getElementById('senha-login').value === SENHA_SISTEMA) {
            localStorage.setItem('auth_portaria', 'true'); exibirSistema();
        } else alert("Senha Incorreta!");
    }

    function exibirSistema() {
        document.getElementById('tela-login').style.display = 'none';
        document.getElementById('conteudo-sistema').style.display = 'block';
        const canvas = document.getElementById('signature-pad');
        pad = new SignaturePad(canvas, { penColor: 'black', throttle: 0, minWidth: 1, maxWidth: 2.5 });
        iniciarEscuta();
        const abaSalva = localStorage.getItem('aba_ativa') || 'registro';
        const btn = document.getElementById('btn-tab-' + abaSalva);
        if(btn) switchTab(abaSalva, btn);
    }

    async function resetarSistema() {
        if(confirm("Deseja Apagar Tudo?")) {
            const s = prompt("Senha Mestre:");
            if(s === "9988") {
                const snap = await window.fb.getDocs(window.fb.collection(window.db, "encomendas"));
                for (const d of snap.docs) await window.fb.deleteDoc(window.fb.doc(window.db, "encomendas", d.id));
                location.reload();
            }
        }
    }

    function processarRastreio(input) {
        let v = input.value.trim(); if(!v) return;
        if(listaTemp.some(i => i.rastreio.toLowerCase().includes(v.toLowerCase())) || 
           dados.some(i => i.rastreio.toLowerCase().includes(v.toLowerCase()))) {
            alert("Encomenda já cadastrada."); input.value = ""; return;
        }
        
        let trans = "Outra";
        // Mercado Livre (Prefixos MLB, 2000, 46, 47)
        if(/^MLB\d+/i.test(v) || /^20000\d+/i.test(v) || /^46\d{9}$/.test(v) || /^47\d{9}$/.test(v)) trans = "Mercado Livre";
        // Shopee (Padrões BR... e pedidos UP...)
        else if(/^BR\d{12}[A-Z]$/i.test(v) || /^UP\d{10}/i.test(v) || /^SPX\d+/i.test(v)) trans = "Shopee";
        // Correios
        else if(/^[A-Z]{2}\d{9}[A-Z]{2}$/i.test(v)) trans = "Correios";
        // J&T Express
        else if(/^JT\d+|^888\d+|^999\d+/i.test(v)) trans = "J&T Express";
        // Loggi
        else if(/^SMP\d+|^11\d{10}/i.test(v) || /^\d{10}$/.test(v)) trans = "Loggi";
        // Amazon
        else if(/^TBC\d{12}/i.test(v) || /^AM\d{12}/i.test(v) || /^TBR\d+/i.test(v)) trans = "Amazon Logistics";
        // Jadlog
        else if(/^\d{14}$/.test(v)) trans = "Jadlog";
        
        input.value = `${trans}: ${v}`;
    }

    function alternarScanner(modo) {
        const idReader = modo === 'entrada' ? 'reader' : 'reader-saida';
        const el = document.getElementById(idReader);
        if (!html5QrCode) {
            el.style.display = 'block'; 
            html5QrCode = new Html5Qrcode(idReader);
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: { width: 280, height: 140 } }, (text) => {
                tocarBip();
                if(modo === 'entrada') {
                    document.getElementById('rastreio').value = text;
                    processarRastreio(document.getElementById('rastreio')); pararScanner();
                } else { selecionarPorScan(text); }
            }).catch(() => { el.style.display = 'none'; });
        } else pararScanner();
    }

    function selecionarPorScan(codigo) {
        const item = dados.find(d => d.status === "PENDENTE" && d.rastreio.toLowerCase().includes(codigo.toLowerCase()));
        if(item) { if(!idsSelecionados.includes(item.id)) idsSelecionados.push(item.id); ultimoSelecionado = item.id; render(); }
    }

    function pararScanner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => { 
                html5QrCode = null; document.getElementById('reader').style.display = 'none'; document.getElementById('reader-saida').style.display = 'none'; 
            });
        }
    }

    function switchTab(aba, btn) {
        pararScanner(); localStorage.setItem('aba_ativa', aba);
        document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
        document.getElementById('aba-' + (aba === 'registro' ? 'registro' : (aba === 'pendentes' ? 'pendentes' : 'retiradas'))).style.display = 'block';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render();
    }

    function iniciarEscuta() {
        const q = window.fb.query(window.fb.collection(window.db, "encomendas"), window.fb.orderBy("dataEntrada", "desc"));
        window.fb.onSnapshot(q, (snap) => {
            dados = snap.docs.map(d => ({ id: d.id, ...d.data() })); render();
        });
    }

    function adicionarNaLista() {
        const r = document.getElementById('rastreio').value, d = document.getElementById('destinatario').value, a = document.getElementById('apto').value;
        const bl = document.getElementById('bloco').value, lo = document.getElementById('loja').value, fun = document.getElementById('recebidoPor').value;
        if(!r || !d || !a || !fun) return alert("Preencha os campos!");
        listaTemp.push({
            rastreio: r, loja: caps(lo) || "Não Informada", dest: caps(d), apto: a, bloco: caps(bl) || "-",
            recebidoPor: caps(fun), dataEntrada: new Date().toISOString(), status: "PENDENTE"
        });
        ['rastreio','destinatario','loja','apto','bloco'].forEach(id => document.getElementById(id).value = "");
        atualizarPreview();
    }

    function atualizarPreview() {
        const div = document.getElementById('lista-pre-entrada');
        div.innerHTML = listaTemp.map((i, idx) => `
            <div class="card" style="background:#fffde7; padding:12px; margin-bottom:5px; border:1px solid #ffd54f;">
                <div style="display:flex; justify-content:space-between;">
                    <div class="detalhes-item no-cap">
                        <b>${i.dest}</b>
                        <span>Apto ${i.apto} | Bl ${i.bloco}</span>
                        <small>${i.loja}</small>
                        <small>${i.rastreio}</small>
                    </div>
                    <button onclick="listaTemp.splice(${idx},1); atualizarPreview();" style="color:red; border:none; background:none; font-size:20px;">×</button>
                </div>
            </div>`).join('');
        document.getElementById('btn-salvar-tudo').style.display = listaTemp.length > 0 ? 'block' : 'none';
    }

    async function salvarNoFirebase() {
        for(let item of listaTemp) { await window.fb.addDoc(window.fb.collection(window.db, "encomendas"), item); }
        listaTemp = []; 
        ['rastreio','destinatario','loja','apto','bloco','recebidoPor'].forEach(id => document.getElementById(id).value = "");
        atualizarPreview();
    }

    function render() {
        const lp = document.getElementById('lista-pendentes'), lr = document.getElementById('lista-retiradas');
        const bP = document.getElementById('busca-pen').value.toLowerCase(), bH = document.getElementById('busca-his').value.toLowerCase();
        if(!lp || !lr) return; lp.innerHTML = ""; lr.innerHTML = "";
        
        dados.forEach(i => {
            const txt = `${i.dest} ${i.apto} ${i.rastreio}`.toLowerCase();
            if(i.status === "PENDENTE" && txt.includes(bP)) {
                lp.innerHTML += `
                <div class="item-row" id="item-${i.id}">
                    <input type="checkbox" style="width:20px; height:20px;" value="${i.id}" ${idsSelecionados.includes(i.id)?"checked":""} onchange="contar()">
                    <div class="detalhes-item no-cap">
                        <b>${i.dest}</b>
                        <span>Apto ${i.apto} | Bl ${i.bloco}</span>
                        <small>${i.loja}</small>
                        <small>${i.rastreio}</small>
                        <div class="info-rec">Rec: ${new Date(i.dataEntrada).toLocaleString()}<br>Por: ${i.recebidoPor}</div>
                    </div>
                </div>`;
            } else if(i.status === "ENTREGUE" && txt.includes(bH)) {
                lr.innerHTML += `
                <div class="item-row entregue">
                    <div class="detalhes-item no-cap" style="flex:1">
                        <b>${i.dest}</b>
                        <span>Apto ${i.apto} | Bl ${i.bloco}</span>
                        <span>${i.loja}</span>
                        <small>${i.rastreio}</small>
                        <div class="info-rec">Data Hora: ${new Date(i.dataRetirada).toLocaleString()}<br>Retirado Por: ${i.quemRetirou}</div>
                    </div>
                    <button class="btn-pdf-icon" onclick="gerarProtocoloIndividual('${i.id}')">📄</button>
                </div>`;
            }
        });
        
        const btnLote = document.getElementById('btn-retirar-lote');
        btnLote.style.display = idsSelecionados.length > 0 ? 'block' : 'none';
        if(idsSelecionados.length > 0) btnLote.innerText = `Baixar Encomendas (${idsSelecionados.length})`;
        
        if (ultimoSelecionado) {
            const el = document.getElementById('item-' + ultimoSelecionado);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' }); ultimoSelecionado = null;
        }
    }

    function contar() { idsSelecionados = Array.from(document.querySelectorAll('#lista-pendentes input:checked')).map(el => el.value); render(); }
    
    function abrirModal() { 
        pararScanner(); document.getElementById('modal-assinatura').style.display='flex';
        const canvas = document.getElementById('signature-pad');
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        pad.clear();
    }
    
    function fecharModal() { document.getElementById('modal-assinatura').style.display='none'; }

    async function confirmarEntrega() {
        const n = caps(document.getElementById('quemRetirou').value);
        if(!n || pad.isEmpty()) return alert("Assinatura e nome obrigatórios!");
        const img = document.getElementById('signature-pad').toDataURL();
        for(let id of idsSelecionados) {
            await window.fb.updateDoc(window.fb.doc(window.db, "encomendas", id), {
                status: "ENTREGUE", dataRetirada: new Date().toISOString(), quemRetirou: n, assinatura: img
            });
        }
        idsSelecionados = []; document.getElementById('quemRetirou').value = ""; fecharModal(); render();
    }

    function gerarRelatorioGeral() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        doc.text("Registro Geral de Encomendas", 148, 15, { align: "center" });
        const columns = ["Destinatário", "Unidade", "Empresa | Rastreio", "Entrada", "Recebido Por", "Saída", "Retirado Por", "Assinatura Retirada"];
        const rows = dados.map(i => [
            i.dest, `Apto ${i.apto} | Bl ${i.bloco}`, `${i.loja}\n${i.rastreio}`,
            new Date(i.dataEntrada).toLocaleString(), i.recebidoPor,
            i.status === "ENTREGUE" ? new Date(i.dataRetirada).toLocaleString() : "",
            i.status === "ENTREGUE" ? i.quemRetirou : "Retirada Pendente", ""
        ]);
        doc.autoTable({
            startY: 25, head: [columns], body: rows, theme: 'grid',
            styles: { fontSize: 8, valign: 'middle', cellPadding: 2 },
            headStyles: { fillColor: [26, 115, 232] },
            didDrawCell: (data) => {
                if (data.column.index === 7 && data.cell.section === 'body') {
                    const item = dados[data.row.index];
                    if (item.status === "ENTREGUE" && item.assinatura) {
                        doc.addImage(item.assinatura, 'PNG', data.cell.x + 2, data.cell.y + 1, 26, 10);
                    }
                }
            }
        });
        doc.save("Registro_Geral.pdf");
    }

    function gerarProtocoloIndividual(id) {
        const i = dados.find(d => d.id === id);
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Recibo de Retirada", 105, 20, { align: "center" });
        const body = [
            ["Destinatário", i.dest], ["Unidade", `Apto ${i.apto} | Bl ${i.bloco}`],
            ["Loja", i.loja], ["Rastreio", i.rastreio], ["Entrada", new Date(i.dataEntrada).toLocaleString()],
            ["Recebido Por", i.recebidoPor], ["Saída", new Date(i.dataRetirada).toLocaleString()], ["Retirado Por", i.quemRetirou]
        ];
        doc.autoTable({ startY: 35, body: body, theme: 'plain', styles: { fontSize: 12, cellPadding: 4 } });
        doc.text("Assinatura Retirada:", 15, doc.lastAutoTable.finalY + 20);
        if(i.assinatura) doc.addImage(i.assinatura, 'PNG', 15, doc.lastAutoTable.finalY + 25, 60, 25);
        doc.save(`Recibo_${i.dest}.pdf`);
    }

    window.addEventListener('DOMContentLoaded', () => {
        if(localStorage.getItem('auth_portaria') === 'true') exibirSistema();
    });
</script>
</body>
</html>

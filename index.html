<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Portaria Pro Offline</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #1a73e8; --success: #28a745; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; background: #000; margin-bottom: 10px; min-height: 250px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 16px; }
        .btn-scan { background: #6f42c1; color: white; }
        .btn-add { background: var(--success); color: white; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        @media print { .no-print { display: none; } #area-print { display: block !important; } table { width: 100%; border-collapse: collapse; } th, td { border: 1px solid #000; padding: 8px; } }
        #area-print { display: none; }
    </style>
</head>
<body>

<div class="card no-print">
    <h2>📦 Portaria Offline</h2>
    <div id="reader"></div>
    <button class="btn btn-scan" onclick="alternarScanner()">📷 ABRIR SCANNER</button>
    <input type="text" id="admInfo" placeholder="Nome/Cargo Adm">
    <input type="text" id="destinatario" placeholder="Morador">
    <input type="text" id="local" placeholder="Apto/Bloco">
    <input type="text" id="rastreio" placeholder="Código/Loja">
    <button class="btn btn-add" onclick="adicionar()">➕ REGISTRAR</button>
    <button class="btn" style="background:#6c757d; color:white;" onclick="window.print()">🖨️ IMPRIMIR LISTA</button>
    <div id="lista-tela"></div>
</div>

<div id="area-print">
    <h2 style="text-align:center">CONTROLE DE ENTREGAS</h2>
    <table>
        <thead><tr><th>Data</th><th>Morador</th><th>Local</th><th>Info</th><th>Assinatura</th></tr></thead>
        <tbody id="tabela-corpo"></tbody>
    </table>
</div>

<script>
    // REGISTRO DO SERVICE WORKER (PARA FUNCIONAR SEM INTERNET)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("Offline Pronto!"));
    }

    let encomendas = [];
    const html5QrCode = new Html5Qrcode("reader");
    let scannerAtivo = false;

    async function alternarScanner() {
        if (scannerAtivo) { await html5QrCode.stop(); scannerAtivo = false; return; }
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            document.getElementById('rastreio').value = text;
            html5QrCode.stop(); scannerAtivo = false;
        }).then(() => scannerAtivo = true);
    }

    function adicionar() {
        const item = {
            data: new Date().toLocaleString('pt-BR'),
            dest: document.getElementById('destinatario').value,
            local: document.getElementById('local').value,
            rastreio: document.getElementById('rastreio').value,
        };
        encomendas.push(item);
        atualizar();
    }

    function atualizar() {
        const tela = document.getElementById('lista-tela');
        const tabela = document.getElementById('tabela-corpo');
        tela.innerHTML = ""; tabela.innerHTML = "";
        encomendas.forEach(i => {
            tela.innerHTML += `<div style="border-bottom:1px solid #eee; padding:5px">${i.dest} - ${i.local}</div>`;
            tabela.innerHTML += `<tr><td>${i.data}</td><td>${i.dest}</td><td>${i.local}</td><td>${i.rastreio}</td><td style="width:150px"></td></tr>`;
        });
    }
</script>
</body>
</html>

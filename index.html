<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a73e8">
    <title>Portaria Digital v78</title>
    <link rel="manifest" href="manifest.json?v=78">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, getDocs, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfZDAEGaSbzm6W63yTqYo01dnnSrOqIzM",
            authDomain: "portari-digiral-v3.firebaseapp.com",
            projectId: "portari-digiral-v3",
            storageBucket: "portari-digiral-v3.firebasestorage.app",
            messagingSenderId: "859559354841",
            appId: "1:859559354841:web:2926bdeb4536029e29b9c8"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.fb = { collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, getDocs, where, deleteDoc };
    </script>

    <script src="https://unpkg.com/html5-qrcode/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --primary: #1a73e8; --success: #28a745; --danger: #dc3545; --warning: #ffc107; --bg: #f0f2f5; --card-gray: #f8f9fa; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; text-transform: capitalize; }
        .no-cap { text-transform: none !important; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: #333; }
        
        #tela-login { position: fixed; top:0; left:0; width:100%; height:100%; background-color: white; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #tela-login::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://cdn-icons-png.flaticon.com/512/2304/2304226.png') no-repeat center; background-size: 70%; opacity: 0.15; z-index: -1; }
        
        .login-card { background: rgba(255, 255, 255, 0.9); padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .login-card h2 { margin-bottom: 25px; color: var(--primary); font-size: 26px; }
        
        /* Ajustes de proximidade no Login */
        .login-card input { margin-bottom: 10px; border: 2px solid #eee; }
        .btn-entrar { width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; background: var(--primary); }
        .btn-recuperar { background: none; border: none; color: var(--primary); font-size: 13px; margin-top: 12px; cursor: pointer; text-transform: none; display: block; width: 100%; }
        
        .btn-limpar-discreto { background: none; border: none; color: #bbb; font-size: 11px; margin-top: 50px; cursor: pointer; text-decoration: underline; text-transform: none; }

        .header { background: var(--primary); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 101; font-weight: bold; }
        .tabs { display: flex; background: white; position: sticky; top: 48px; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-btn { flex: 1; padding: 15px 5px; border: none; background: none; font-weight: bold; color: #666; font-size: 13px; cursor: pointer; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 15px; }
        input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; margin-bottom: 10px; }
        
        .footer-logout { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 10px; border-top: 1px solid #eee; display: flex; justify-content: center; z-index: 102; }
        .btn-logout { background: #f8f9fa; color: #666; border: 1px solid #ddd; padding: 8px 20px; border-radius: 20px; font-size: 12px; font-weight: bold; }

        .item-row { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--danger); display: flex; align-items: center; gap: 12px; }
        .item-row.entregue { border-left-color: var(--success); background: var(--card-gray); }
        .detalhes-item { flex: 1; line-height: 1.4; }
        .detalhes-item b { font-size: 16px; color: #000; }
        .detalhes-item span { color: #555; display: block; font-size: 14px; margin-top: 2px; }
        .detalhes-item small { color: #888; display: block; font-size: 12px; }

        #modal-assinatura { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 95%; max-width: 400px; }
        .sig-wrapper { background: #FFFFFF; border: 2px solid #ccc; border-radius: 8px; margin-top: 10px; overflow: hidden; }
        canvas { width: 100%; height: 200px; touch-action: none; cursor: crosshair; display: block; }
        .btn-pdf-small { background: #f1f3f4; color: #d93025; padding: 8px; border-radius: 6px; border: 1px solid #dadce0; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div id="tela-login">
    <div class="login-card">
        <h2 class="no-cap">Portaria Digital v78</h2>
        <input type="password" id="senha-login" placeholder="Senha De Acesso">
        <button class="btn-entrar" onclick="verificarAcesso()">Entrar</button>
        <button class="btn-recuperar" onclick="recuperarSenha()">Esqueci minha senha</button>
        <button class="btn-limpar-discreto" onclick="resetarSistema()">Reset System</button>
    </div>
</div>

<div id="conteudo-sistema" style="display:none;">
    <div class="header">Portaria Digital v78</div>
    <div class="tabs">
        <button id="btn-tab-registro" class="tab-btn active" onclick="switchTab('registro', this)">Entrada</button>
        <button id="btn-tab-saida" class="tab-btn" onclick="switchTab('pendentes', this)">Saída</button>
        <button class="tab-btn" onclick="switchTab('retiradas', this)">Histórico</button>
    </div>

    <div id="aba-registro" class="container">
        <div class="card">
            <div id="reader"></div>
            <button class="btn" style="background:#6f42c1" onclick="alternarScanner('entrada')">📷 Escanear Código</button>
            <input type="text" id="rastreio" placeholder="Rastreio" class="no-cap" onblur="processarRastreio(this)">
            <input type="text" id="loja" placeholder="Empresa/Loja">
            <input type="text" id="destinatario" placeholder="Nome Do Destinatário">
            <div style="display:flex; gap:10px;">
                <input type="text" id="apto" placeholder="Apto" style="flex:1;">
                <input type="text" id="bloco" placeholder="Bloco" style="flex:1;">
            </div>
            <input type="text" id="recebidoPor" placeholder="Recebido Por (Funcionário)">
            <button class="btn" style="background:var(--primary)" onclick="adicionarNaLista()">+ Adicionar À Lista</button>
            <div id="lista-pre-entrada"></div>
            <button id="btn-salvar-tudo" class="btn" style="background:var(--success); display:none;" onclick="salvarNoFirebase()">Salvar Entrada</button>
        </div>
    </div>

    <div id="aba-pendentes" class="container" style="display:none;">
        <div id="reader-saida"></div>
        <button class="btn" style="background:#6f42c1" onclick="alternarScanner('saida')">📷 Escanear Para Saída</button>
        <input type="text" id="busca-pen" placeholder="🔍 Buscar Encomendas..." oninput="render()">
        <button id="btn-retirar-lote" class="btn" style="background:var(--warning); color:#000; display:none;" onclick="abrirModal()">Dar Baixa Nos Selecionados</button>
        <div id="lista-pendentes"></div>
    </div>

    <div id="aba-retiradas" class="container" style="display:none;">
        <button class="btn" style="background:#333;" onclick="gerarRelatorio()">📄 Relatório Geral Completo</button>
        <input type="text" id="busca-his" placeholder="🔍 Filtrar Histórico..." oninput="render()">
        <div id="lista-retiradas"></div>
    </div>

    <div class="footer-logout">
        <button class="btn-logout" onclick="location.reload()">⬅ Sair do Sistema</button>
    </div>
</div>

<div id="modal-assinatura">
    <div class="modal-content">
        <h3>Confirmar Retirada</h3>
        <input type="text" id="quemRetirou" placeholder="Retirado Por">
        <div class="sig-wrapper"><canvas id="signature-pad"></canvas></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn" style="background:var(--danger); flex:1" onclick="fecharModal()">Cancelar</button>
            <button class="btn" id="btn-confirm-final" style="background:var(--success); flex:1" onclick="confirmarEntrega()">Confirmar Saída</button>
        </div>
    </div>
</div>

<script>
    let dados = [], listaTemp = [], idsSelecionados = [], pad, html5QrCode;
    const SENHA_SISTEMA = "1234";
    const EMAIL_ADMIN = "contato.acardoso@gmail.com";

    function caps(str) { return str ? str.toLowerCase().replace(/(^\w|\s\w)/g, m => m.toUpperCase()) : ""; }

    function ajustarCanvas() {
        const canvas = document.getElementById('signature-pad');
        if(!canvas) return;
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        if (pad) pad.clear();
    }

    function verificarAcesso() {
        if(document.getElementById('senha-login').value === SENHA_SISTEMA) {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('conteudo-sistema').style.display = 'block';
            pad = new SignaturePad(document.getElementById('signature-pad'), { penColor: 'black', minDistance: 0, velocityFilterWeight: 0.7 });
            window.addEventListener("resize", ajustarCanvas);
            iniciarEscuta();
        } else alert("Senha Incorreta!");
    }

    function recuperarSenha() {
        alert(`Solicitação enviada!\n\nA senha de acesso foi encaminhada para o e-mail: ${EMAIL_ADMIN}`);
    }

    async function resetarSistema() {
        if(confirm("Deseja Apagar Tudo?")) {
            const s = prompt("Senha Mestre:");
            if(s === "9988") {
                const snap = await window.fb.getDocs(window.fb.collection(window.db, "encomendas"));
                for (const d of snap.docs) await window.fb.deleteDoc(window.fb.doc(window.db, "encomendas", d.id));
                location.reload();
            }
        }
    }

    function processarRastreio(input) {
        let v = input.value.trim();
        if(!v) return;
        if(listaTemp.some(i => i.rastreio.toLowerCase().includes(v.toLowerCase())) || 
           dados.some(i => i.rastreio.toLowerCase().includes(v.toLowerCase()))) {
            alert("Esta encomenda já consta no sistema.");
            input.value = "";
            return;
        }
        identificarTransportadora(input);
    }

function identificarTransportadora(input) {
        let v = input.value.trim();
        if(!v || v.includes(':')) return;
        let emp = "";
        
        // REGRAS DE IDENTIFICAÇÃO AUTOMÁTICA (Nacionais e Focadas no RJ)
        if(/^[A-Z]{2}\d{9}[A-Z]{2}$/i.test(v)) emp = "Correios";
        else if(/^MLB\d+/i.test(v)) emp = "Mercado Livre";
        else if(/^JT\d+|^888\d+/i.test(v)) emp = "J&T Express";
        else if(/^3320\d+|^UP\d+/i.test(v)) emp = "iMile";
        else if(/^SMP\d+|^11\d{10}/i.test(v)) emp = "Loggi";
        else if(/^BR\d{13}[A-Z]$/i.test(v) || /^SPX\d+/i.test(v)) emp = "Shopee Xpress";
        else if(/^TBC\d{12}/i.test(v) || /^AM\d{12}/i.test(v)) emp = "Amazon Logistics";
        else if(/^\d{14}$/.test(v)) emp = "Jadlog";
        else if(/^SQ\d{9}/i.test(v) || /^SF\d{9}/i.test(v)) emp = "Sequoia";
        else if(/^MA\d{9}/i.test(v)) emp = "Mandaê";
        else if(/^TEX\d+/i.test(v)) emp = "Total Express";
        else if(/^DIR\d+/i.test(v) || /^DC\d+/i.test(v)) emp = "Direct (B2W)";
        else if(/^TF\d+/i.test(v)) emp = "Transfolha";
        else if(/^AZC\d+/i.test(v) || /^\d{11}$/.test(v)) emp = "Azul Cargo";
        else if(/^KG\d+/i.test(v) || /^PGK\d+/i.test(v)) emp = "Kangu/Pegaki";
        
        input.value = `${emp}: ${v}`;
    }
    
    function alternarScanner(modo) {
        const idReader = modo === 'entrada' ? 'reader' : 'reader-saida';
        if (!html5QrCode) {
            document.getElementById(idReader).style.display = 'block';
            html5QrCode = new Html5Qrcode(idReader);
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                if(modo === 'entrada') {
                    document.getElementById('rastreio').value = text;
                    processarRastreio(document.getElementById('rastreio'));
                    pararScanner();
                } else { selecionarPorScan(text); }
            });
        } else pararScanner();
    }

    function selecionarPorScan(codigo) {
        const item = dados.find(d => d.status === "PENDENTE" && d.rastreio.toLowerCase().includes(codigo.toLowerCase()));
        if(item) { if(!idsSelecionados.includes(item.id)) { idsSelecionados.push(item.id); render(); } }
        else alert("Não encontrado.");
    }

    function pararScanner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => { 
                html5QrCode = null; 
                document.getElementById('reader').style.display = 'none'; 
                document.getElementById('reader-saida').style.display = 'none'; 
            });
        }
    }

    function switchTab(aba, btn) {
        pararScanner();
        document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
        document.getElementById('aba-' + aba).style.display = 'block';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function iniciarEscuta() {
        const q = window.fb.query(window.fb.collection(window.db, "encomendas"), window.fb.orderBy("dataEntrada", "desc"));
        window.fb.onSnapshot(q, (snap) => {
            dados = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            render();
        });
    }

    function adicionarNaLista() {
        const r = document.getElementById('rastreio').value, d = document.getElementById('destinatario').value, a = document.getElementById('apto').value;
        const bl = document.getElementById('bloco').value, lo = document.getElementById('loja').value;
        const fun = document.getElementById('recebidoPor').value;
        if(!r || !d || !a || !fun) return alert("Preencha todos os campos!");
        listaTemp.push({
            rastreio: r, loja: caps(lo) || "Não Informada",
            dest: caps(d), apto: a, bloco: caps(bl) || "-",
            recebidoPor: caps(fun),
            dataEntrada: new Date().toISOString(), status: "PENDENTE"
        });
        ['rastreio','destinatario','loja','apto','bloco'].forEach(id => document.getElementById(id).value = "");
        atualizarPreview();
    }

    function atualizarPreview() {
        const div = document.getElementById('lista-pre-entrada');
        div.innerHTML = listaTemp.map((i, idx) => `
            <div class="card" style="background:#fffde7; border:1px solid #ffd54f; padding:10px;">
                <div style="display:flex; justify-content:space-between;">
                    <div class="detalhes-item no-cap">
                        <b>${i.dest}</b>
                        <span>Apto ${i.apto} - Bl ${i.bloco}</span>
                        <span>${i.loja}</span>
                        <small>${i.rastreio}</small>
                    </div>
                    <button onclick="listaTemp.splice(${idx},1); atualizarPreview();" style="color:red; border:none; background:none; font-size:20px;">×</button>
                </div>
            </div>`).join('');
        document.getElementById('btn-salvar-tudo').style.display = listaTemp.length > 0 ? 'block' : 'none';
    }

    async function salvarNoFirebase() {
        for(let item of listaTemp) { await window.fb.addDoc(window.fb.collection(window.db, "encomendas"), item); }
        listaTemp = []; atualizarPreview();
    }

    function render() {
        const lp = document.getElementById('lista-pendentes'), lr = document.getElementById('lista-retiradas');
        const bP = document.getElementById('busca-pen').value.toLowerCase(), bH = document.getElementById('busca-his').value.toLowerCase();
        lp.innerHTML = ""; lr.innerHTML = "";
        
        dados.forEach(i => {
            const txt = `${i.dest} ${i.apto} ${i.rastreio}`.toLowerCase();
            if(i.status === "PENDENTE" && txt.includes(bP)) {
                lp.innerHTML += `<div class="item-row">
                    <input type="checkbox" style="width:22px; height:22px;" value="${i.id}" ${idsSelecionados.includes(i.id)?"checked":""} onchange="contar()">
                    <div class="detalhes-item no-cap">
                        <b>${i.dest}</b>
                        <span>Apto ${i.apto} - Bl ${i.bloco}</span>
                        <span>${i.loja}</span>
                        <small>${i.rastreio}</small>
                        <small style="margin-top:5px; border-top:1px solid #eee; padding-top:3px;">Rec: ${new Date(i.dataEntrada).toLocaleString()} - Por: ${i.recebidoPor}</small>
                    </div>
                </div>`;
            } else if(i.status === "ENTREGUE" && txt.includes(bH)) {
                lr.innerHTML += `<div class="item-row entregue">
                    <div class="detalhes-item no-cap" style="flex:1">
                        <b>${i.dest}</b>
                        <span>Apto ${i.apto} - Bl ${i.bloco}</span>
                        <span>${i.loja}</span>
                        <small>${i.rastreio}</small>
                        <span style="color:var(--success); font-weight:bold; margin-top:5px;">Retirado: ${new Date(i.dataRetirada).toLocaleString()}</span>
                        <small>Por: ${i.quemRetirou}</small>
                    </div>
                    <div class="btn-pdf-small" onclick="gerarProtocoloIndividual('${i.id}')">📄</div>
                </div>`;
            }
        });
        document.getElementById('btn-retirar-lote').style.display = idsSelecionados.length > 0 ? 'block' : 'none';
    }

    function contar() { idsSelecionados = Array.from(document.querySelectorAll('#lista-pendentes input:checked')).map(el => el.value); render(); }
    function abrirModal() { pararScanner(); document.getElementById('modal-assinatura').style.display='flex'; setTimeout(ajustarCanvas, 10); }
    function fecharModal() { document.getElementById('modal-assinatura').style.display='none'; }

    async function confirmarEntrega() {
        const n = caps(document.getElementById('quemRetirou').value);
        if(!n || pad.isEmpty()) return alert("Nome e Assinatura!");
        const img = document.getElementById('signature-pad').toDataURL();
        for(let id of idsSelecionados) {
            await window.fb.updateDoc(window.fb.doc(window.db, "encomendas", id), {
                status: "ENTREGUE", dataRetirada: new Date().toISOString(), quemRetirou: n, assinatura: img
            });
        }
        idsSelecionados = []; document.getElementById('quemRetirou').value = ""; fecharModal(); render();
    }

    async function gerarRelatorio() {
        if(!window.jspdf) return alert("Erro no PDF.");
        const { jsPDF } = window.jspdf;
        const docR = new jsPDF('l', 'mm', 'a4');
        docR.text("Relatório Geral de Encomendas", 148, 12, { align: 'center' });
        
        const rows = dados.map(i => [
            `${i.rastreio}\n(${i.loja})`,
            `${i.dest}\n(Bl ${i.bloco} Apto ${i.apto})`,
            `${i.recebidoPor}\n(${new Date(i.dataEntrada).toLocaleString()})`,
            i.status === "ENTREGUE" ? `${i.quemRetirou}\n(${new Date(i.dataRetirada).toLocaleString()})` : "Pendente",
            "" 
        ]);

        docR.autoTable({
            startY: 20,
            head: [['Rastreio (Empresa)', 'Destinatário (Bl Apto)', 'Recebido Por (Data Hora)', 'Retirado Por (Data Hora)', 'Assinatura']],
            body: rows,
            theme: 'grid',
            styles: { fontSize: 8, valign: 'middle', cellPadding: 2 },
            headStyles: { fillColor: [26, 115, 232], cellPadding: 2 },
            columnStyles: { 4: { cellWidth: 35 } },
            didDrawCell: (data) => {
                if (data.column.index === 4 && data.cell.section === 'body') {
                    const item = dados[data.row.index];
                    if (item && item.status === "ENTREGUE" && item.assinatura) {
                        // Cálculo para enquadrar assinatura no centro da célula sem vazar
                        const padding = 1.5;
                        const cellW = data.cell.width - (padding * 2);
                        const cellH = data.cell.height - (padding * 2);
                        docR.addImage(item.assinatura, 'PNG', data.cell.x + padding, data.cell.y + padding, cellW, cellH);
                    }
                }
            }
        });
        docR.save("Relatorio_Geral.pdf");
    }

    function gerarProtocoloIndividual(id) {
        const i = dados.find(d => d.id === id);
        const { jsPDF } = window.jspdf;
        const docP = new jsPDF();
        docP.text("Recibo de Entrega", 105, 20, { align: 'center' });
        docP.autoTable({ 
            startY: 30, 
            body: [
                ['Destinatário', i.dest], 
                ['Apto/Bloco', `Apto ${i.apto} - Bl ${i.bloco}`],
                ['Empresa/Loja', i.loja],
                ['Rastreio', i.rastreio],
                ['Entrada', new Date(i.dataEntrada).toLocaleString()],
                ['Recebido Por', i.recebidoPor],
                ['Saída', new Date(i.dataRetirada).toLocaleString()], 
                ['Quem Retirou', i.quemRetirou]
            ],
            theme: 'plain',
            styles: { fontSize: 12, cellPadding: 3, valign: 'middle' }
        });
        docP.text("Assinatura do Morador:", 15, docP.lastAutoTable.finalY + 15);
        docP.addImage(i.assinatura, 'PNG', 15, docP.lastAutoTable.finalY + 20, 50, 20);
        docP.save(`Recibo_${i.dest}.pdf`);
    }
</script>
</body>
</html>
